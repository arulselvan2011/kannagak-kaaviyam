    <div class="poem-container" style="text-align: center;">
        <a href="index.html" class="back-btn" style="display: block; text-align: left;">← முகப்பு பக்கத்திற்கு போக</a>
        
        <h1 style="color: #8e44ad; margin-bottom: 5px;">பக்தன் துதி</h1>
        <p style="font-weight: bold; color: #7f8c8d; margin-top: 0;">ஆசிரியர்: ம. அருள் செல்வன் | பாட்டுடைத் தலைவன்: கண்ணகன் (இறைநிலை)</p>
        <hr>
        
        <pre class="poem-text">
காட்சியின் கருவைக் கனாவில் கண்டேன்,
மனம் மயங்கி மாற்றமாய் மாறினேன்,
கடவுளின் கருணையை உன் கண்களில் கண்டேன்,
உயிர்வாழ்வரின் உக்குரல் உரைத்து உயிர்த்தெழுநீ.
        </pre>

        <hr>
        <p style="text-align: right; font-weight: bold; color: #8e44ad;">- ம. அருள் செல்வன்</p>
    </div>
